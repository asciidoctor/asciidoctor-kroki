name: Build JavaScript

on:
  push:
    paths-ignore:
      - 'README.md'
      - 'RELEASE.md'
      - 'ruby/**'
    branches:
      - master

  pull_request:
    paths-ignore:
      - 'README.md'
      - 'RELEASE.md'
      - 'ruby/**'
    branches:
      - '*'

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-2025
        node-version:
          - 24
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up Node ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - name: Install dependencies
      run: |
        npm ci
        npx playwright install chromium
    - name: Lint and test
      run: |
        npm run lint
        npm t
