name: Build JavaScript

on:
  push:
    paths-ignore:
      - 'README.md'
      - 'RELEASE.md'
      - 'ruby/**'
    branches:
      - main

  pull_request:
    paths-ignore:
      - 'README.md'
      - 'RELEASE.md'
      - 'ruby/**'
    branches:
      - '*'

  workflow_call:
    inputs:
      ref:
        required: false
        type: string

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
    - name: Set up Node 24
      uses: actions/setup-node@v6
      with:
        node-version: 24
    - name: Install dependencies
      run: npm ci
    - name: Check formatting
      run: npm run format:check
    - name: Check lint
      run: npm run lint:check
    - name: Build
      run: npm run build

  test:
    needs: checks
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-2025
        node-version:
          - 22
          - 24
        exclude:
          # only test the minimum supported Node version on Linux
          - os: windows-2025
            node-version: 22
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
    - name: Set up Node ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
    - name: Install dependencies
      run: |
        npm ci
        npx playwright install chromium
    - name: Test
      run: npm t
      env:
        DEBUG: 'testcontainers'
